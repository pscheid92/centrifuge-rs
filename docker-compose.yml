services:
  # Insecure server for basic integration tests (no auth required)
  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo --client.insecure
    ports:
      - "8000:8000"
    environment:
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_HISTORY_SIZE=100
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_HISTORY_TTL=300s
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_FORCE_RECOVERY=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_PRESENCE=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_JOIN_LEAVE=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_FORCE_PUSH_JOIN_LEAVE=true
      - CENTRIFUGO_CLIENT_CHANNEL_LIMIT=50

  # JWT-auth server for token tests + server-side subscriptions
  centrifugo-auth:
    image: centrifugo/centrifugo:v6
    command: centrifugo
    ports:
      - "8001:8000"
    environment:
      - CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY=test-secret-key-for-integration-tests
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_HISTORY_SIZE=100
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_HISTORY_TTL=300s
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_FORCE_RECOVERY=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_PRESENCE=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_JOIN_LEAVE=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_FORCE_PUSH_JOIN_LEAVE=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_ALLOW_PUBLISH_FOR_SUBSCRIBER=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_ALLOW_PUBLISH_FOR_CLIENT=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_ALLOW_HISTORY_FOR_SUBSCRIBER=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_ALLOW_PRESENCE_FOR_SUBSCRIBER=true
      - CENTRIFUGO_CHANNEL_WITHOUT_NAMESPACE_ALLOW_SUBSCRIBE_FOR_CLIENT=true
      - CENTRIFUGO_CLIENT_SUBSCRIBE_TO_USER_PERSONAL_CHANNEL_ENABLED=true
      - CENTRIFUGO_CLIENT_SUBSCRIBE_TO_USER_PERSONAL_CHANNEL_PERSONAL_CHANNEL_NAMESPACE=
      - CENTRIFUGO_CLIENT_SUBSCRIBE_TO_USER_PERSONAL_CHANNEL_SINGLE_CONNECTION=false
      - CENTRIFUGO_CLIENT_CHANNEL_LIMIT=50
